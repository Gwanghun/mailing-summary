name: Daily Newsletter Digest

on:
  # UTC 22:00 = KST 07:00 (next day)
  schedule:
    - cron: "0 22 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  run-digest:
    name: Build and Send Daily Digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data logs

      - name: Restore Google OAuth token
        run: echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > data/token.json

      - name: Run digest pipeline
        env:
          ENVIRONMENT: github_actions
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: python main.py run-digest

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-run-log-${{ github.run_id }}
          path: logs/
          retention-days: 7
