name: Daily Newsletter Digest

on:
  # UTC 22:00 = KST 07:00 (next day)
  schedule:
    - cron: "0 22 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  run-digest:
    name: Build and Send Daily Digest
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout repository
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up Python 3.12
      # ----------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ----------------------------------------------------------------
      # 3. Install dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Restore Google OAuth token from secret
      #
      #    The token.json file contains the OAuth2 access/refresh token.
      #    It is stored as a GitHub secret (base64-encoded JSON) and
      #    written to the expected path before the main script runs.
      # ----------------------------------------------------------------
      - name: Restore Google OAuth token
        run: |
          mkdir -p data
          echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > data/token.json

      # ----------------------------------------------------------------
      # 5. Create logs directory
      # ----------------------------------------------------------------
      - name: Create logs directory
        run: mkdir -p logs

      # ----------------------------------------------------------------
      # 6. Run digest pipeline
      # ----------------------------------------------------------------
      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: python main.py run-digest

      # ----------------------------------------------------------------
      # 7. Upload run log as artifact (retained for 7 days)
      # ----------------------------------------------------------------
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-run-log-${{ github.run_id }}
          path: logs/run.log
          retention-days: 7
